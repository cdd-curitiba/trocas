<style>
:root{
  --bg:#f0f4f8;--surface:#fff;--border:#e2e8f0;
  --navy:#1e3a5f;--navy2:#152d4a;--text:#1e293b;--muted:#64748b;
  --ok:#16a34a;--ok-bg:#dcfce7;
  --alerta:#d97706;--alerta-bg:#fef3c7;
  --critico:#dc2626;--critico-bg:#fee2e2;
  --troca:#0369a1;--troca-bg:#e0f2fe;
  --remessa:#7c3aed;--remessa-bg:#ede9fe;
  --pendente:#3b82f6;--pendente-bg:#eff6ff;
  --reprovada:#ef4444;--reprovada-bg:#fef2f2;
  --repauto:#f97316;--repauto-bg:#fff7ed;
  --font:'Barlow',sans-serif;--font2:'Barlow Condensed',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;padding-bottom:60px}

.topbar{background:#0f172a;color:#fff;padding:0 20px;position:sticky;top:0;z-index:100;box-shadow:0 1px 16px rgba(0,0,0,.35);border-bottom:1px solid rgba(255,255,255,.06)}
.topbar-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;min-height:52px;padding:8px 0}
.topbar-left{display:flex;align-items:center;gap:12px}
.topbar-logo{width:30px;height:30px;border-radius:6px;background:#1d4ed8;display:flex;align-items:center;justify-content:center;font-family:var(--font2);font-size:.85rem;font-weight:800;color:#fff;flex-shrink:0}
.topbar h1{font-family:var(--font2);font-size:1.1rem;font-weight:800}
.topbar .sub{font-size:.7rem;opacity:.38;margin-top:1px;font-family:var(--font2)}
.pills{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.pill{display:flex;align-items:center;gap:5px;border-radius:5px;padding:4px 10px;font-family:var(--font2);font-size:.72rem;font-weight:700;border:1px solid transparent}
.pill-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.pill.critico{background:rgba(220,38,38,.15);color:#fca5a5;border-color:rgba(220,38,38,.25)}
.pill.critico .pill-dot{background:#ef4444}
.pill.alerta{background:rgba(217,119,6,.15);color:#fcd34d;border-color:rgba(217,119,6,.25)}
.pill.alerta .pill-dot{background:#f59e0b}
.pill.ok{background:rgba(5,150,105,.15);color:#6ee7b7;border-color:rgba(5,150,105,.25)}
.pill.ok .pill-dot{background:#10b981}
.pill.pendente{background:rgba(59,130,246,.15);color:#93c5fd;border-color:rgba(59,130,246,.25)}
.pill.pendente .pill-dot{background:#3b82f6}
.pill.reprov{background:rgba(239,68,68,.15);color:#fca5a5;border-color:rgba(239,68,68,.25)}
.pill.reprov .pill-dot{background:#ef4444}

.tabs{background:#0f172a;border-bottom:2px solid #1e293b;padding:0 20px}
.tabs-inner{max-width:1100px;margin:0 auto;display:flex;gap:0}
.tab-btn{padding:10px 22px;font-family:var(--font2);font-size:.9rem;font-weight:700;color:#64748b;background:none;border:none;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .2s;white-space:nowrap}
.tab-btn:hover{color:#cbd5e1}
.tab-btn.active{color:#fff;border-bottom-color:#3b82f6}

.filters{background:var(--navy2);padding:10px 20px;border-bottom:1px solid rgba(255,255,255,.08)}
.filters-inner{max-width:1100px;margin:0 auto;display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}
.fg{display:flex;flex-direction:column;gap:3px}
.fg label{font-size:.65rem;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em;font-weight:600}
.fg select,.fg input{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:6px 10px;border-radius:6px;font-size:.8rem;font-family:var(--font);outline:none;cursor:pointer;min-width:130px}
.fg select:focus,.fg input:focus{border-color:#3b82f6}
.fg input{min-width:150px}
.btn-limpar{padding:6px 14px;border-radius:6px;border:1px solid #334155;background:transparent;color:#94a3b8;cursor:pointer;font-size:.8rem;font-family:var(--font);align-self:flex-end}
.btn-limpar:hover{color:#e2e8f0;border-color:#64748b}

.countbar{max-width:1100px;margin:8px auto 0;padding:0 20px;font-size:.78rem;color:var(--muted)}
.countbar strong{color:var(--navy)}

.content{max-width:1100px;margin:0 auto;padding:16px 20px}

.setor-block{margin-bottom:24px}
.setor-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--border)}
.setor-label{font-family:var(--font2);font-size:1rem;font-weight:800;color:var(--navy);background:#e2e8f0;padding:3px 12px;border-radius:20px}
.setor-sala{font-size:.75rem;color:var(--muted);font-weight:600}
.setor-stats{display:flex;gap:6px;margin-left:auto;flex-wrap:wrap}
.setor-stat{font-family:var(--font2);font-size:.7rem;font-weight:700;padding:2px 8px;border-radius:10px}
.setor-stat.critico{background:var(--critico-bg);color:var(--critico)}
.setor-stat.alerta{background:var(--alerta-bg);color:var(--alerta)}
.setor-stat.pendente{background:var(--pendente-bg);color:var(--pendente)}
.setor-stat.reprov{background:var(--reprovada-bg);color:var(--reprovada)}

.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}

.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06);transition:box-shadow .15s,transform .15s}
.card:hover{box-shadow:0 4px 16px rgba(0,0,0,.1);transform:translateY(-1px)}
.card.critico{border-left:4px solid var(--critico)}
.card.alerta{border-left:4px solid var(--alerta)}
.card.ok{border-left:4px solid var(--ok)}
.card.pend-card{border-left:4px solid var(--pendente)}
.card.status-pendente{border-left:4px solid var(--pendente)}
.card.status-reprovada{border-left:4px solid var(--reprovada)}
.card.status-repauto{border-left:4px solid var(--repauto)}

.card-head{padding:10px 12px;display:flex;align-items:flex-start;justify-content:space-between;gap:8px;border-bottom:1px solid var(--border)}
.card-cliente{font-family:var(--font2);font-size:1rem;font-weight:800;color:var(--navy)}
.card-meta{font-size:.7rem;color:var(--muted);margin-top:3px}

.badge{display:inline-flex;align-items:center;font-family:var(--font2);font-size:.68rem;font-weight:700;padding:2px 8px;border-radius:10px;white-space:nowrap}
.badge.critico{background:var(--critico-bg);color:var(--critico)}
.badge.alerta{background:var(--alerta-bg);color:var(--alerta)}
.badge.ok{background:var(--ok-bg);color:var(--ok)}
.badge.aguard{background:#f1f5f9;color:#64748b}
.badge.atendido{background:var(--ok-bg);color:var(--ok)}
.badge.reprovada{background:var(--reprovada-bg);color:var(--reprovada)}
.badge.repauto{background:var(--repauto-bg);color:var(--repauto)}
.badge.falta{background:var(--critico-bg);color:var(--critico)}
.badge.parcial{background:var(--alerta-bg);color:var(--alerta)}
.badge.pendente-badge{background:var(--pendente-bg);color:var(--pendente)}

.card-body{padding:10px 12px}
.tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.tag{font-size:.68rem;padding:2px 7px;border-radius:4px;background:#f1f5f9;color:var(--muted)}
.tag.motivo{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}

.prod-toggle{width:100%;background:#f8fafc;border:1px solid var(--border);color:var(--muted);padding:6px 10px;border-radius:6px;cursor:pointer;font-size:.75rem;font-family:var(--font);text-align:left;display:flex;justify-content:space-between;align-items:center;transition:background .15s}
.prod-toggle:hover{background:#f1f5f9;color:var(--text)}
.prod-list{display:none;margin-top:8px}
.prod-list.open{display:block}
.prod-item{padding:6px 0;border-bottom:1px solid var(--border);font-size:.75rem}
.prod-item:last-child{border-bottom:none}
.prod-nome{color:var(--text);font-weight:600;margin-bottom:3px}
.prod-row{display:flex;flex-wrap:wrap;gap:8px;color:var(--muted);margin-top:2px}
.prod-tipo{font-family:var(--font2);font-size:.68rem;font-weight:700;padding:1px 6px;border-radius:4px}
.prod-tipo.troca{background:var(--troca-bg);color:var(--troca)}
.prod-tipo.remessa{background:var(--remessa-bg);color:var(--remessa)}
.prod-justif{margin-top:3px;font-size:.68rem;color:#2563eb;background:#eff6ff;padding:2px 6px;border-radius:4px;display:inline-block}
.prod-motivo{margin-top:3px;font-size:.68rem;color:#dc2626;background:#fef2f2;padding:2px 6px;border-radius:4px;display:inline-block}

.card-foot{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border-top:1px solid var(--border);background:#f8fafc}
.card-total-lbl{font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;font-weight:600}
.card-total-val{font-family:var(--font2);font-size:.95rem;font-weight:800;color:var(--navy)}
.idade-badge{font-family:var(--font2);font-size:.75rem;font-weight:800;padding:2px 8px;border-radius:10px}
.idade-badge.ok{background:var(--ok-bg);color:var(--ok)}
.idade-badge.alerta{background:var(--alerta-bg);color:var(--alerta)}
.idade-badge.critico{background:var(--critico-bg);color:var(--critico)}

.empty{text-align:center;padding:60px 20px;color:var(--muted);font-size:.9rem}
</style>
</head>

const ALL_SETORES = ["11","101","103","104","105","106","107","108","109","110","111","112","113","201","202","203","204","205","206","207","208","209","210","211","212","271","301","302","303","304","305","306","307","308","309","310","311","312","371","372","401","402","403","404","405","406","407","408","409","410","411","471","472","510","511","512","551","552","553","554","555","556","557","558","559","563","621","622","631","632","633","634","641","642","643","997"];

let currentTab = 'aprov';

function salaDoSetor(s){return s&&s[0]?s[0]:'?'}

function switchTab(tab){
  currentTab = tab;
  ['aprov','pend','reprov'].forEach(t=>{
    document.getElementById('tab-'+t).classList.toggle('active', t===tab);
  });
  const isAprov = tab==='aprov';
  document.getElementById('fg-tipo').style.display  = isAprov ? '' : 'none';
  document.getElementById('fg-atend').style.display = isAprov ? '' : 'none';
  document.getElementById('filTipo').value     = 'all';
  document.getElementById('filSitAtend').value = 'all';
  updatePills();
  render();
}

function onSalaChange(){
  const sala = document.getElementById('filSala').value;
  const sel  = document.getElementById('filSetor');
  const filtrados = sala==='all' ? ALL_SETORES : ALL_SETORES.filter(s=>salaDoSetor(s)===sala);
  sel.innerHTML = '<option value="all">Todos os setores</option>'
    + filtrados.map(s=>`<option value="${s}">Setor ${s}</option>`).join('');
  render();
}

function limpar(){
  document.getElementById('filSala').value     = 'all';
  document.getElementById('filTipo').value     = 'all';
  document.getElementById('filSitAtend').value = 'all';
  document.getElementById('filCodigo').value   = '';
  onSalaChange();
}

function updatePills(){
  const pills = document.getElementById('pills');
  if(currentTab==='aprov'){
    const crit = DATA_APROV.filter(d=>d.urgencia==='critico').length;
    const ale  = DATA_APROV.filter(d=>d.urgencia==='alerta').length;
    const ok   = DATA_APROV.filter(d=>d.urgencia==='ok').length;
    pills.innerHTML=
      `<span class="pill critico"><span class="pill-dot"></span>${crit} Crítico</span>`+
      `<span class="pill alerta"><span class="pill-dot"></span>${ale} Alerta</span>`+
      `<span class="pill ok"><span class="pill-dot"></span>${ok} Recente</span>`;
  } else if(currentTab==='pend'){
    const n = DATA_PEND.length;
    pills.innerHTML=`<span class="pill pendente"><span class="pill-dot"></span>${n} Pendente${n!==1?'s':''}</span>`;
  } else {
    const n = DATA_REPROV.length;
    pills.innerHTML=`<span class="pill reprov"><span class="pill-dot"></span>${n} Reprovada${n!==1?'s':''}</span>`;
  }
}

function fmt(v){return parseFloat(v).toFixed(2).replace('.',',');}

function togProd(btn){
  const l=btn.nextElementSibling;
  l.classList.toggle('open');
  btn.querySelector('span:last-child').textContent=l.classList.contains('open')?'▲':'▼';
}

function filterBase(data){
  const sala  = document.getElementById('filSala').value;
  const setor = document.getElementById('filSetor').value;
  const cod   = document.getElementById('filCodigo').value.trim();
  return data.filter(d=>{
    if(sala!=='all'  && salaDoSetor(d.setor)!==sala) return false;
    if(setor!=='all' && d.setor!==setor) return false;
    if(cod && !d.cliente.includes(cod)) return false;
    return true;
  });
}

function renderSetorBlock(itens, cardFn, statsFn){
  const setores=[...new Set(itens.map(d=>d.setor))].sort((a,b)=>parseInt(a)-parseInt(b));
  return setores.map(s=>{
    const grupo = itens.filter(d=>d.setor===s);
    const stats = statsFn(grupo);
    const cards = grupo.map(cardFn).join('');
    return `<div class="setor-block">
      <div class="setor-header">
        <span class="setor-label">Setor ${s}</span>
        <span class="setor-sala">Sala ${salaDoSetor(s)}</span>
        <div class="setor-stats">${stats}</div>
      </div>
      <div class="cards-grid">${cards}</div>
    </div>`;
  }).join('');
}

function cardAprov(d){
  const isAguard   = d.sit_atend==='Ag. Atendimento';
  const isAtendido = d.sit_atend==='Atendido'||d.sit_atend==='Atendido Parcial';
  const isFalta    = d.sit_atend==='Falta';
  const isRoteiriz = d.sit_pedido==='Ag. Roteirizacao';
  const isAtend    = d.sit_atend==='Atendido';
  const cardCls    = isAtend && !isRoteiriz && !isAguard ? 'card ok' : (isAguard || isRoteiriz) ? 'card critico' : `card ${d.urgencia}`;

  // Badge principal: status real do pedido tem prioridade
  const sitBadge = isAguard || isRoteiriz
    ? '<span class="badge aguard">Aguardando Pedido</span>'
    : isFalta ? '<span class="badge falta">Falta</span>'
    : d.sit_atend==='Atendido Parcial' ? '<span class="badge parcial">Atend. Parcial</span>'
    : isAtend ? '<span class="badge atendido">✅ Atendido</span>'
    : '';
  const urgBadge = (!isAguard && !isRoteiriz && !isFalta && !isAtend)
    ? `<span class="badge ${d.urgencia}">${d.urgencia==='critico'?'Crítico':d.urgencia==='alerta'?'Alerta':'Recente'}</span>`
    : '';

  // Data só aparece se for Atendido E não estiver aguardando roteirização
  const dataMeta = (isAtend && !isRoteiriz && !isAguard)
    ? `<div class="card-meta">${d.data} · ${d.sit_pedido}</div>`
    : `<div class="card-meta">${d.sit_pedido}</div>`;

  const prods = d.produtos.map(p=>{
    const tc = p.tipo==='Troca'?'troca':'remessa';
    return `<div class="prod-item">
      <div class="prod-nome">${p.produto}</div>
      <div class="prod-row">
        <span>${p.und==="cx" ? "1 cx ("+p.fator+" un)" : p.qtd+" un"}</span>
        <span>R$ ${fmt(p.valor)}</span>
        <span class="prod-tipo ${tc}">${p.tipo}</span>
      </div>
    </div>`;
  }).join('');

  return `<div class="${cardCls}">
    <div class="card-head">
      <div>
        <div class="card-cliente">Cód. ${d.cliente}</div>
        ${dataMeta}
      </div>
      <div style="display:flex;flex-direction:column;gap:4px;align-items:flex-end">
        ${sitBadge}${urgBadge}
      </div>
    </div>
    <div class="card-body">
      <button class="prod-toggle" onclick="togProd(this)">
        <span>${d.produtos.length} produto${d.produtos.length>1?'s':''}</span><span>▼</span>
      </button>
      <div class="prod-list">${prods}</div>
    </div>
    <div class="card-foot">
      <span class="card-total-lbl">Total</span>
      <div style="display:flex;align-items:center;gap:8px">
        <span class="idade-badge ${d.urgencia}">${d.max_idade===1?"1 dia":d.max_idade+" dias"}</span>
        <span class="card-total-val">R$ ${fmt(d.total_valor)}</span>
      </div>
    </div>
  </div>`;
}

function cardLog(d){
  const isReprov = d.status==='Reprovada'||d.status==='Reprovada Auto';
  const sc  = d.status==='Pendente'?'status-pendente':d.status==='Reprovada'?'status-reprovada':'status-repauto';
  const bc  = d.status==='Pendente'?'pendente-badge':d.status==='Reprovada'?'reprovada':'repauto';
  const sl  = d.status==='Reprovada Auto'?'Reprov. Auto':d.status;

  const jtags = d.justifs.map(j=>`<span class="tag">${j}</span>`).join('');
  const mtags = d.motivos.map(m=>`<span class="tag motivo">⚠ ${m}</span>`).join('');

  const prods = d.produtos.map(p=>
    `<div class="prod-item">
      <div class="prod-nome">${p.produto}</div>
      <div class="prod-row">
        <span>${p.qtd} ${p.um}</span>
        <span>R$ ${fmt(p.valor)}</span>
      </div>
      ${p.justif?`<div class="prod-justif">${p.justif}</div>`:''}
      ${p.motivo?`<div class="prod-motivo">✗ ${p.motivo}</div>`:''}
    </div>`
  ).join('');

  return `<div class="card ${sc}">
    <div class="card-head">
      <div>
        <div class="card-cliente">Cód. ${d.cliente}</div>
        <div class="card-meta">Data Solicitação: ${d.data}</div>
      </div>
      <span class="badge ${bc}">${sl}</span>
    </div>
    <div class="card-body">
      ${jtags||mtags?`<div class="tags">${jtags}${mtags}</div>`:''}
      <button class="prod-toggle" onclick="togProd(this)">
        <span>${d.produtos.length} produto${d.produtos.length>1?'s':''}</span><span>▼</span>
      </button>
      <div class="prod-list">${prods}</div>
    </div>
    <div class="card-foot">
      <span class="card-total-lbl">Valor Total</span>
      <span class="card-total-val">R$ ${fmt(d.total_valor)}</span>
    </div>
  </div>`;
}

function render(){
  const app = document.getElementById('app');
  const countBar = document.getElementById('countBar');

  if(currentTab==='aprov'){
    const tipo     = document.getElementById('filTipo').value;
    const sitAtend = document.getElementById('filSitAtend').value;
    let f = filterBase(DATA_APROV).filter(d=>{
      if(tipo!=='all' && !d.produtos.some(p=>p.tipo===tipo)) return false;
      if(sitAtend!=='all'){
        const isAguard   = d.sit_atend==='Ag. Atendimento';
        const isRoteiriz = d.sit_pedido==='Ag. Roteirizacao';
        const isAtendido = (d.sit_atend==='Atendido'||d.sit_atend==='Atendido Parcial') && !isRoteiriz;
        const isAguardando = isAguard || isRoteiriz;
        if(sitAtend==='Ag. Atendimento' && !isAguardando) return false;
        if(sitAtend==='Atendido'        && !isAtendido)   return false;
        if(sitAtend==='Falta'           && d.sit_atend!=='Falta') return false;
      }
      return true;
    });
    countBar.innerHTML=`Exibindo <strong>${f.length}</strong> clientes de ${DATA_APROV.length} registros`;
    if(!f.length){app.innerHTML='<div class="empty">Nenhum registro encontrado.</div>';return;}
    app.innerHTML = renderSetorBlock(f, cardAprov, g=>{
      const nC=g.filter(d=>d.urgencia==='critico').length;
      const nA=g.filter(d=>d.urgencia==='alerta').length;
      return [
        nC>0?`<span class="setor-stat critico">${nC} Crítico${nC>1?'s':''}</span>`:'',
        nA>0?`<span class="setor-stat alerta">${nA} Alerta${nA>1?'s':''}</span>`:'',
      ].filter(Boolean).join('');
    });

  } else if(currentTab==='pend'){
    const f = filterBase(DATA_PEND);
    countBar.innerHTML=`Exibindo <strong>${f.length}</strong> clientes de ${DATA_PEND.length} registros`;
    if(!f.length){app.innerHTML='<div class="empty">Nenhum registro encontrado.</div>';return;}
    app.innerHTML = renderSetorBlock(f, cardLog, g=>{
      const n=g.length;
      return `<span class="setor-stat pendente">${n} Pendente${n>1?'s':''}</span>`;
    });

  } else {
    const f = filterBase(DATA_REPROV);
    countBar.innerHTML=`Exibindo <strong>${f.length}</strong> clientes de ${DATA_REPROV.length} registros`;
    if(!f.length){app.innerHTML='<div class="empty">Nenhum registro encontrado.</div>';return;}
    app.innerHTML = renderSetorBlock(f, cardLog, g=>{
      const n=g.length;
      return `<span class="setor-stat reprov">${n} Reprovada${n>1?'s':''}</span>`;
    });
  }
}

updatePills();
render();
</script>
